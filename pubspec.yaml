name: beer_inventory_app
description: A bar inventory app for tracking beer and beverage stock
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  mobile_scanner: ^5.2.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  uuid: ^4.2.1
  sqflite: ^2.3.0
  path: ^1.8.3
  image_picker: ^1.0.5
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
