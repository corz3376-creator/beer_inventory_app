name: Manual APK Release Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v5

      - name: Initialize Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Initialize Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: Generate Android Workspace
        run: |
          flutter clean
          flutter create --platforms=android --org com.corz3376 --force .

      - name: Fetch Core Dependencies
        run: flutter pub get

      - name: Execute Production APK Build
        run: flutter build apk --release --ignore-deprecation

      - name: Archive Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beer-inventory-apk
          path: build/app/outputs/flutter-apk/app-release.apk
