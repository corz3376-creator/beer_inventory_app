name: Forced Production Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  production_compile:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Repository Code
        uses: actions/checkout@v4

      - name: Configure Java Runtime
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configure Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: Clean Workspace Environment
        run: flutter clean

      - name: Structural Scaffold Sync
        run: flutter create --platforms=android --org com.corz3376 --overwrite .

      - name: Download App Packages
        run: flutter pub get

      - name: Compile Release Binary
        run: flutter build apk --debug

      - name: Export Release Package
        uses: actions/upload-artifact@v4
        with:
          name: beer-inventory-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
        run: flutter build apk --release --ignore-deprecation

      - name: Export Release Package
        uses: actions/upload-artifact@v4
        with:
          name: beer-inventory-apk
          path: build/app/outputs/flutter-apk/app-release.apk
