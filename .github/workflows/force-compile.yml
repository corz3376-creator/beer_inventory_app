name: Forced Production Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  production_compile:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Repository Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure Java Runtime
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configure Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: Regenerate Clean Platform Folders
        run: |
          rm -rf android amdroid ios web windows macos linux
          flutter create --platforms=android .

      - name: Configure Local Android Properties
        run: |
          echo "flutter.compileSdkVersion=35" >> android/local.properties
          echo "flutter.targetSdkVersion=35" >> android/local.properties

      - name: Clean Workspace Environment
        run: flutter clean

      - name: Download App Packages
        run: flutter pub get

      - name: Compile Release Binary
        run: flutter build apk --debug

      - name: Export Release Package
        uses: actions/upload-artifact@v4
        with:
          name: beer-inventory-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Download App Packages
        run: flutter pub get

      - name: Compile Release Binary
        run: flutter build apk --debug --build-name=1.0.0 --build-number=1 --dart-define=android.compileSdkVersion=35

      - name: Export Release Package
        uses: actions/upload-artifact@v4
        with:
          name: beer-inventory-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
